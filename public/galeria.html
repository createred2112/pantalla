<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Galería · Estudio GasteizBerri</title>
<link rel="stylesheet" href="/api/fontcss">
<style>
  :root{--bg:#091220;--bg2:#0e2036;--card:#12233f;--line:#264169;--line2:#33568c;--accent:#e2231a;--txt:#eef3fc;--muted:#9db3d8;--warn:#e8ac16}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;color:var(--txt);
    background:linear-gradient(180deg,var(--bg2) 0%,var(--bg) 340px);min-height:100vh}
  header{position:sticky;top:0;background:rgba(7,17,33,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);
    padding:11px 16px;display:flex;align-items:center;gap:12px;z-index:5;flex-wrap:wrap}
  header h1{font-family:'Anton','Oswald',system-ui,sans-serif;font-weight:400;font-size:17px;margin:0;flex:1;letter-spacing:2px;text-transform:uppercase}
  a.btn,button.btn{text-decoration:none;background:transparent;border:1px solid var(--line);color:var(--muted);
    padding:9px 13px;border-radius:10px;font:inherit;font-size:13px;cursor:pointer}
  a.btn:hover,button.btn:hover{color:var(--txt);background:rgba(38,65,105,.35)}
  button.btn.primary{background:var(--accent);border-color:transparent;color:#fff;font-weight:700}
  button.btn:disabled{opacity:.5;cursor:not-allowed}
  main{padding:16px;max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
  .cell{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:0 10px 26px rgba(0,0,0,.3)}
  .cell .lbl{padding:9px 12px;font-size:13px;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .cell .lbl b{font-weight:700}
  .cell .lbl span{color:var(--muted);font-size:11px}
  .cell .theme{display:inline-block;margin-left:5px;padding:2px 6px;border:1px solid var(--line2);border-radius:999px;color:var(--txt);font-size:10px}
  .cell img{width:100%;aspect-ratio:16/9;object-fit:contain;background:#000;display:block}
  .cell .ph{width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;color:var(--muted);
    background:repeating-linear-gradient(45deg,#0a1a30,#0a1a30 12px,#0c1d36 12px,#0c1d36 24px);font-size:13px}
  .note{grid-column:1/-1;color:var(--muted);font-size:13px;border:1px dashed var(--line);border-radius:12px;padding:12px 14px;
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:rgba(18,35,63,.35)}
  .note.warn{border-color:rgba(232,172,22,.5);color:#ffd98a}
  .spin{display:inline-block;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header>
  <h1>Galería de plantillas</h1>
  <span id="ver" style="color:var(--muted);font-size:12px"></span>
  <button class="btn" id="btnGenerate">↻ Regenerar muestras</button>
  <button class="btn" id="btnMatrix">Todos los colores</button>
  <a class="btn" href="/">← Volver al panel</a>
</header>
<main id="grid"><div class="note">Cargando…</div></main>
<script>
// Las muestras viven en el servidor (output/samples): entrar aquí NO renderiza
// nada. Solo se regeneran al pulsar el botón o si cambió el diseño global.
const grid = document.getElementById('grid');
const btn = document.getElementById('btnGenerate');
const btnMatrix = document.getElementById('btnMatrix');
let MATRIX = false;

function paint(state, msg) {
  grid.innerHTML = '';
  if (msg) {
    const n = document.createElement('div');
    n.className = 'note' + (msg.warn ? ' warn' : '');
    n.innerHTML = msg.html;
    grid.appendChild(n);
  }
  for (const t of state.items) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.innerHTML = `<div class="lbl"><b>${t.label}</b><span>${t.id}${t.url && !t.fresh ? ' · desactualizada' : ''}</span></div>` +
      (t.url ? `<img alt="${t.id}" loading="lazy" src="${t.url}">` : `<div class="ph">sin muestra</div>`);
    if (t.theme) cell.querySelector('.lbl span').insertAdjacentHTML('beforeend', `<i class="theme">${t.theme}</i>`);
    grid.appendChild(cell);
  }
}

async function load() {
  try {
    const r = await fetch('/api/template-samples' + (MATRIX ? '?matrix=1' : ''));
    if (r.status === 401) { location.href = '/login'; return; }
    const state = await r.json();
    const missing = state.items.filter((i) => !i.url).length;
    let msg = null;
    if (missing === state.items.length) {
      msg = { warn: true, html: MATRIX ? 'Todavía no hay auditoría de todos los colores. Pulsa <b>Regenerar muestras</b>; tardará un poco.' : 'Todavía no hay muestras generadas. Pulsa <b>Regenerar muestras</b> (solo hace falta una vez).' };
    } else if (!state.fresh) {
      msg = { warn: true, html: 'El diseño ha cambiado desde la última generación: las muestras pueden no reflejarlo. Pulsa <b>Regenerar muestras</b> cuando quieras.' };
    }
    paint(state, msg);
  } catch {
    grid.innerHTML = '<div class="note warn">No se pudo cargar la galería.</div>';
  }
}

btn.addEventListener('click', async () => {
  btn.disabled = true;
  btnMatrix.disabled = true;
  btn.innerHTML = '<span class="spin">◠</span> Generando…';
  try {
    const r = await fetch('/api/template-samples' + (MATRIX ? '?matrix=1' : ''), { method: 'POST' });
    const state = await r.json();
    if (!r.ok) throw new Error(state.error || 'error');
    paint(state, { html: `Muestras al día · generadas ${state.generatedAt ? new Date(state.generatedAt).toLocaleString('es-ES') : 'ahora'}.` });
  } catch (e) {
    grid.insertAdjacentHTML('afterbegin', `<div class="note warn">No se pudieron generar: ${e.message}</div>`);
  } finally {
    btn.disabled = false;
    btnMatrix.disabled = false;
    btn.innerHTML = '↻ Regenerar muestras';
  }
});

btnMatrix.addEventListener('click', () => {
  MATRIX = !MATRIX;
  btnMatrix.classList.toggle('primary', MATRIX);
  btnMatrix.textContent = MATRIX ? 'Vista normal' : 'Todos los colores';
  grid.innerHTML = '<div class="note">Cargando…</div>';
  load();
});

fetch('/api/whoami').then((r) => r.json()).then((w) => {
  if (w.simpleMode) {
    location.href = '/';
    return;
  }
  document.getElementById('ver').textContent = w.version ? ('v' + w.version) : '';
}).catch(() => {});
load();
</script>
</body>
</html>
